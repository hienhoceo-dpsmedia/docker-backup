version: '3.8'

services:
  backup-manager:
    image: ghcr.io/hienhoceo-dpsmedia/docker-backup:latest
    container_name: docker-backup-manager
    restart: unless-stopped
    user: root
    
    # Bind to Docker gateway IP for security (only accessible via reverse proxy)
    ports:
      - "172.17.0.1:3005:3000"
    
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
      # Backup performance policy (lower impact on VPS)
      - BACKUP_ZIP_LEVEL=${BACKUP_ZIP_LEVEL:-4}
      - INCLUDE_DB_VOLUME_BACKUP=${INCLUDE_DB_VOLUME_BACKUP:-false}
      - BACKUP_MAX_LOADAVG=${BACKUP_MAX_LOADAVG:-1.8}
      - BACKUP_MAX_DISK_UTIL=${BACKUP_MAX_DISK_UTIL:-85}
      - BACKUP_CHECK_INTERVAL_MS=${BACKUP_CHECK_INTERVAL_MS:-30000}
      - BACKUP_MAX_DEFERRALS=${BACKUP_MAX_DEFERRALS:-20}
      - BACKUP_DISK_SAMPLE_MS=${BACKUP_DISK_SAMPLE_MS:-1000}
      # Telegram configuration (optional)
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_API_ROOT=${TELEGRAM_API_ROOT:-}
      - CHAT_ID=${CHAT_ID:-}
    
    volumes:
      # Docker socket access (required for container management)
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Persistent data storage
      - ./data:/app/data
      - ./backups:/app/backups
      
      # Optional: Rclone config for cloud backups
      # - ./rclone.conf:/root/.config/rclone/rclone.conf:ro
    
    networks:
      - default
      - nginx-proxy-manager_default

    # Resource caps to reduce impact on production workloads
    cpus: "0.75"
    mem_limit: 1g
    pids_limit: 256
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
    blkio_config:
      weight: 200
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  default:
    name: backup-manager-network
  nginx-proxy-manager_default:
    external: true
